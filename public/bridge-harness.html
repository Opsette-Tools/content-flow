<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Content Flow Bridge Harness</title>
    <style>
      body { font: 13px system-ui; margin: 12px; }
      pre { background: #f5f5f5; padding: 8px; max-height: 320px; overflow: auto; border-radius: 4px; }
      iframe { border: 1px solid #ccc; border-radius: 4px; }
      h1 { font-size: 16px; margin: 0 0 8px; }
      .note { color: #666; margin-bottom: 8px; }
    </style>
  </head>
  <body>
    <h1>Content Flow Bridge Harness (dev only)</h1>
    <p class="note">
      Loads the tool in an iframe, replies to <code>ready</code> with a mock
      <code>init</code>, and echoes acks for every <code>save</code> /
      <code>save_presets</code> / <code>delete</code>. Does NOT persist anything.
      Use the DevTools console inside the iframe to poke <code>window.__bridge</code>.
    </p>
    <iframe id="child" src="/" width="100%" height="600"></iframe>
    <h2>Message log</h2>
    <pre id="log"></pre>
    <script>
      const logEl = document.getElementById("log");
      const log = (msg) => {
        logEl.textContent += msg + "\n";
        logEl.scrollTop = logEl.scrollHeight;
      };

      window.addEventListener("message", (e) => {
        if (!e.data || e.data.source !== "opsette" || e.data.version !== 1) return;
        log("← " + JSON.stringify(e.data));

        const child = document.getElementById("child").contentWindow;
        const send = (payload) => {
          child.postMessage({ source: "opsette", version: 1, ...payload }, "*");
          log("→ " + JSON.stringify(payload));
        };

        if (e.data.type === "ready") {
          send({ type: "init", presets: {}, items: [] });
        } else if (e.data.type === "save") {
          send({
            type: "saved",
            request_id: e.data.request_id,
            data_id: e.data.data_id,
            updated_at: new Date().toISOString(),
          });
        } else if (e.data.type === "save_presets") {
          send({
            type: "presets_saved",
            request_id: e.data.request_id,
            updated_at: new Date().toISOString(),
          });
        } else if (e.data.type === "delete") {
          send({
            type: "deleted",
            request_id: e.data.request_id,
            data_id: e.data.data_id,
          });
        }
      });
    </script>
  </body>
</html>
