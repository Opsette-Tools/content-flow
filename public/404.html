<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Content Planner</title>
    <script>
      // GitHub Pages SPA fallback: redirect to index with the original path encoded
      var path = window.location.pathname + window.location.search + window.location.hash;
      sessionStorage.setItem("spa-redirect", path);
      window.location.replace("/");
    </script>
  </head>
  <body></body>
</html>
